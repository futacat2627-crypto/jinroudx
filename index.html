<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>夜の村 - 人狼</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3f;
    --accent: #c8a96e;
    --accent2: #7b5ea7;
    --wolf: #e05c5c;
    --moon: #f0e6c8;
    --text: #e8e0d0;
    --muted: #7a7a9a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  button { touch-action: manipulation; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    position: relative;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(1px 1px at 10% 15%, rgba(240,230,200,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(240,230,200,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 10%, rgba(240,230,200,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 55%, rgba(240,230,200,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 20%, rgba(240,230,200,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 65%, rgba(240,230,200,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 35%, rgba(240,230,200,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 70%, rgba(240,230,200,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 80%, rgba(240,230,200,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 85%, rgba(240,230,200,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 30%, rgba(240,230,200,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 75%, rgba(240,230,200,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 90%, rgba(240,230,200,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 5%, rgba(240,230,200,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 50%, rgba(240,230,200,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Screens */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    padding: 20px;
    position: relative;
    z-index: 1;
    animation: fadeIn 0.5s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ========= TITLE SCREEN ========= */
  #screen-title {
    justify-content: center;
    gap: 0;
    padding: 0;
    overflow: hidden;
  }

  .title-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, rgba(123,94,167,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 50% 20%, rgba(200,169,110,0.08) 0%, transparent 60%);
  }

  .moon {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f8f0d8, #d4c090 60%, #a08040);
    box-shadow:
      0 0 40px rgba(200,169,110,0.4),
      0 0 80px rgba(200,169,110,0.15),
      inset -15px -10px 30px rgba(0,0,0,0.3);
    margin-bottom: 8px;
    animation: moonPulse 4s ease-in-out infinite;
    position: relative;
    z-index: 1;
  }

  @keyframes moonPulse {
    0%, 100% { box-shadow: 0 0 40px rgba(200,169,110,0.4), 0 0 80px rgba(200,169,110,0.15), inset -15px -10px 30px rgba(0,0,0,0.3); }
    50% { box-shadow: 0 0 60px rgba(200,169,110,0.6), 0 0 120px rgba(200,169,110,0.25), inset -15px -10px 30px rgba(0,0,0,0.3); }
  }

  .wolf-icon {
    font-size: 64px;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 20px rgba(224,92,92,0.5));
    animation: wolfBreath 3s ease-in-out infinite;
  }

  @keyframes wolfBreath {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(224,92,92,0.5)); }
    50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(224,92,92,0.8)); }
  }

  .title-main {
    font-family: 'Shippori Mincho', serif;
    font-size: 52px;
    font-weight: 800;
    letter-spacing: 0.15em;
    color: var(--moon);
    text-shadow: 0 0 30px rgba(200,169,110,0.5);
    position: relative;
    z-index: 1;
    margin-top: 12px;
  }

  .title-sub {
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    letter-spacing: 0.5em;
    color: var(--muted);
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }

  .title-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 28px auto;
    position: relative;
    z-index: 1;
  }

  .btn-play {
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    font-family: 'Shippori Mincho', serif;
    font-size: 20px;
    letter-spacing: 0.3em;
    padding: 16px 52px;
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    z-index: 1;
    transition: all 0.3s ease;
    overflow: hidden;
  }

  .btn-play::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
    z-index: -1;
  }

  .btn-play:active::before { transform: scaleX(1); }
  .btn-play:active { color: var(--bg); }

  .forest-silhouette {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 160px;
    background: linear-gradient(to top, #0a0a0f 30%, transparent);
    z-index: 1;
    pointer-events: none;
  }

  .forest-silhouette svg {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 160px;
    opacity: 0.7;
  }

  /* ========= COUNT SCREEN ========= */
  #screen-count {
    justify-content: flex-start;
    padding-top: 60px;
  }

  .screen-header {
    text-align: center;
    margin-bottom: 36px;
    width: 100%;
  }

  .screen-label {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .screen-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--moon);
  }

  .count-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 360px;
  }

  .btn-count {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-count::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(200,169,110,0.15) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-count:active::after { opacity: 1; }
  .btn-count:active { border-color: var(--accent); transform: scale(0.97); }

  .count-num {
    font-family: 'Shippori Mincho', serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--accent);
    display: block;
    line-height: 1;
  }

  .count-label {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.1em;
  }

  /* ========= NAME INPUT SCREEN ========= */
  #screen-names {
    justify-content: flex-start;
    padding-top: 60px;
  }

  .names-list {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .name-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .name-row:focus-within { border-color: var(--accent); }

  .name-num {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    min-width: 28px;
  }

  .name-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    flex: 1;
    caret-color: var(--accent);
  }

  .name-input::placeholder { color: var(--muted); font-size: 14px; }

  /* ========= MODE SCREEN ========= */
  #screen-mode {
    justify-content: center;
    gap: 0;
    padding-top: 60px;
  }

  .mode-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 360px;
    margin-top: 36px;
  }

  .mode-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    text-align: left;
  }

  .mode-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .mode-card.normal-card::before { background: linear-gradient(90deg, transparent, var(--accent), transparent); }
  .mode-card.job-card::before { background: linear-gradient(90deg, transparent, var(--accent2), transparent); }

  .mode-card:active { transform: scale(0.97); }
  .mode-card:active::before { opacity: 1; }
  .mode-card.normal-card:active { border-color: var(--accent); }
  .mode-card.job-card:active { border-color: var(--accent2); }

  .mode-icon { font-size: 32px; margin-bottom: 10px; display: block; }
  .mode-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--moon);
    margin-bottom: 6px;
  }

  .mode-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .mode-badge {
    position: absolute;
    top: 16px; right: 16px;
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid;
  }

  .badge-standard { color: var(--accent); border-color: var(--accent); }
  .badge-coming { color: var(--accent2); border-color: var(--accent2); opacity: 0.7; }

  /* ========= BUTTONS ========= */
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'Shippori Mincho', serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.2em;
    padding: 15px 0;
    width: 100%;
    max-width: 360px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

  .btn-back {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    padding: 10px 20px;
    cursor: pointer;
    margin-top: 10px;
  }

  .btn-back:active { color: var(--text); }

  /* Progress dots */
  .progress-dots {
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }

  .dot.active { background: var(--accent); }
  .dot.done { background: var(--accent); opacity: 0.4; }

  /* Scroll container for names */
  .scroll-area {
    width: 100%;
    max-width: 380px;
    flex: 1;
    overflow-y: auto;
    padding-bottom: 10px;
  }

  .scroll-area::-webkit-scrollbar { width: 3px; }
  .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ========= DEAL PHASE ========= */
  #screen-deal {
    justify-content: center;
    padding: 30px 24px;
    gap: 0;
  }

  .deal-progress {
    position: absolute;
    top: 24px;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--muted);
  }

  /* --- PASS STATE --- */
  .pass-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    gap: 0;
  }

  .pass-icon {
    font-size: 52px;
    margin-bottom: 20px;
    animation: passFloat 2s ease-in-out infinite;
  }

  @keyframes passFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .pass-instruction {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .pass-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 34px;
    font-weight: 800;
    color: var(--moon);
    margin-bottom: 6px;
  }

  .pass-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 44px;
    letter-spacing: 0.1em;
  }

  .btn-reveal {
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    letter-spacing: 0.25em;
    padding: 15px 40px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    max-width: 300px;
  }

  .btn-reveal:active {
    background: var(--accent);
    color: var(--bg);
    transform: scale(0.97);
  }

  /* --- ROLE REVEAL STATE --- */
  .reveal-state {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    animation: revealPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes revealPop {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }

  .role-card {
    width: 100%;
    max-width: 320px;
    border-radius: 16px;
    padding: 32px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 28px;
    border: 1.5px solid;
  }

  .role-card.citizen {
    background: linear-gradient(145deg, #1a2a1a, #121a12);
    border-color: #4a8a4a;
    box-shadow: 0 0 40px rgba(74,138,74,0.15);
  }

  .role-card.solo {
    background: linear-gradient(145deg, #0e2030, #0a1820);
    border-color: #38c8e0;
    box-shadow: 0 0 40px rgba(56,200,224,0.15);
  }

  .role-card.wolf {
    background: linear-gradient(145deg, #2a1010, #1a0a0a);
    border-color: var(--wolf);
    box-shadow: 0 0 40px rgba(224,92,92,0.2);
  }

  .role-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .role-card.citizen::before { background: linear-gradient(90deg, transparent, #4a8a4a, transparent); }
  .role-card.wolf::before    { background: linear-gradient(90deg, transparent, var(--wolf), transparent); }
  .role-card.solo::before    { background: linear-gradient(90deg, transparent, #38c8e0, transparent); }

  .role-emoji { font-size: 56px; margin-bottom: 14px; display: block; }

  .role-tag {
    font-size: 10px;
    letter-spacing: 0.4em;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
    display: inline-block;
  }

  .role-card.citizen .role-tag { background: rgba(74,138,74,0.2);    color: #7ac07a; border: 1px solid rgba(74,138,74,0.4); }
  .role-card.wolf .role-tag    { background: rgba(224,92,92,0.15);   color: #e08080; border: 1px solid rgba(224,92,92,0.3); }
  .role-card.solo .role-tag    { background: rgba(56,200,224,0.15);  color: #56c8e0; border: 1px solid rgba(56,200,224,0.3); }

  .role-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 30px;
    font-weight: 800;
    margin: 8px 0 14px;
    display: block;
  }

  .role-card.citizen .role-name { color: #d0f0d0; }
  .role-card.wolf .role-name    { color: #ffd0d0; }
  .role-card.solo .role-name    { color: #d0f0ff; }

  .role-desc-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--muted);
  }

  .role-warning {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 20px;
    padding: 10px 16px;
    border: 1px dashed var(--border);
    border-radius: 6px;
    max-width: 300px;
    text-align: center;
  }

  .btn-confirm {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    letter-spacing: 0.2em;
    padding: 15px 0;
    width: 100%;
    max-width: 300px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-confirm:active {
    border-color: var(--accent);
    color: var(--accent);
    transform: scale(0.97);
  }

  /* ========= DAY PHASE ========= */
  #screen-day {
    justify-content: flex-start;
    padding-top: 44px;
  }

  .phase-header {
    text-align: center;
    width: 100%;
    margin-bottom: 28px;
  }

  .phase-day-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(200,169,110,0.1);
    border: 1px solid rgba(200,169,110,0.3);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .phase-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--moon);
  }

  .phase-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .alive-section {
    width: 100%;
    max-width: 380px;
    margin-bottom: 24px;
  }

  .alive-section-label {
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .alive-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .alive-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .alive-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4a8;
    display: inline-block;
  }

  .day-note {
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  /* ========= VOTE PHASE ========= */
  #screen-vote {
    justify-content: flex-start;
    padding-top: 44px;
  }

  .voter-pass {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .voter-instruction {
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .voter-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--moon);
    margin-bottom: 4px;
  }

  .voter-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .vote-targets {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .btn-vote-target {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    text-align: left;
    cursor: pointer;
    font-size: 16px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
  }

  .btn-vote-target:active {
    border-color: var(--wolf);
    background: rgba(224,92,92,0.08);
    transform: scale(0.98);
  }

  .vote-target-icon {
    font-size: 20px;
    width: 32px;
    text-align: center;
  }

  .btn-vote-skip {
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 13px 0;
    width: 100%;
    max-width: 380px;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-vote-skip:active {
    border-color: var(--muted);
    color: var(--text);
  }

  .vote-progress-bar {
    width: 100%;
    max-width: 380px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .vote-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ========= EXECUTE RESULT ========= */
  #screen-execute {
    justify-content: flex-start;
    text-align: center;
    padding: 40px 24px;
    overflow-y: auto;
  }

  .execute-icon { font-size: 60px; margin-bottom: 20px; }

  .execute-label {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .execute-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--moon);
    margin-bottom: 8px;
  }

  .execute-role-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 13px;
    margin-bottom: 12px;
  }

  .execute-role-badge.wolf { background: rgba(224,92,92,0.15); color: #e08080; border: 1px solid rgba(224,92,92,0.3); }
  .execute-role-badge.citizen { background: rgba(74,138,74,0.15); color: #7ac07a; border: 1px solid rgba(74,138,74,0.3); }

  .execute-votes-summary {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 36px;
    line-height: 1.7;
  }

  .execute-divider {
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 auto 28px;
  }

  .no-execute-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 28px;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 320px;
  }

  /* ========= DEAL ALL DONE STATE ========= */
  .alldone-state {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    text-align: center;
    animation: fadeIn 0.5s ease;
  }

  .alldone-icon { font-size: 52px; margin-bottom: 20px; }
  .alldone-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--moon);
    margin-bottom: 10px;
  }
  .alldone-sub { font-size: 14px; color: var(--muted); margin-bottom: 40px; line-height: 1.6; }

  /* ========= NIGHT PHASE ========= */
  #screen-night { justify-content: center; padding: 30px 24px; }
  #screen-morning { justify-content: flex-start; text-align: center; padding: 40px 24px; overflow-y: auto; }

  .night-progress {
    position: absolute; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 12px; letter-spacing: 0.3em; color: var(--muted);
  }

  .night-pass-wrap {
    display: flex; flex-direction: column; align-items: center;
    width: 100%; text-align: center;
  }

  .night-icon { font-size: 52px; margin-bottom: 16px; animation: passFloat 2s ease-in-out infinite; }

  .night-pass-label { font-size: 12px; letter-spacing: 0.35em; color: var(--muted); margin-bottom: 8px; }
  .night-pass-name {
    font-family: 'Shippori Mincho', serif; font-size: 30px; font-weight: 700;
    color: var(--moon); margin-bottom: 4px;
  }
  .night-pass-sub { font-size: 13px; color: var(--muted); margin-bottom: 10px; }

  .night-caution {
    font-size: 12px; color: #c05050; margin-bottom: 36px;
    padding: 8px 16px; border: 1px dashed rgba(224,92,92,0.3); border-radius: 6px;
  }

  .btn-night-reveal {
    background: transparent; border: 1.5px solid rgba(200,169,110,0.5);
    color: var(--accent); font-family: 'Shippori Mincho', serif;
    font-size: 15px; letter-spacing: 0.25em; padding: 14px 36px; border-radius: 4px;
    cursor: pointer; transition: all 0.2s; width: 100%; max-width: 280px;
  }
  .btn-night-reveal:active { background: rgba(200,169,110,0.1); transform: scale(0.97); }

  .night-action-wrap {
    display: none; flex-direction: column; align-items: center; width: 100%;
    animation: revealPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }

  .night-role-header { text-align: center; margin-bottom: 20px; }
  .night-role-emoji { font-size: 36px; margin-bottom: 8px; display: block; }
  .night-role-label { font-size: 10px; letter-spacing: 0.4em; color: var(--muted); margin-bottom: 4px; }
  .night-action-title {
    font-family: 'Shippori Mincho', serif; font-size: 20px; font-weight: 600; color: var(--moon);
  }

  .night-targets {
    width: 100%; max-width: 340px; display: flex;
    flex-direction: column; gap: 10px; margin-bottom: 16px;
  }

  .btn-night-target {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; text-align: left; cursor: pointer; font-size: 15px;
    color: var(--text); font-family: 'Noto Sans JP', sans-serif;
    display: flex; align-items: center; gap: 12px; transition: all 0.2s; width: 100%;
  }
  .btn-night-target.wolf-t:active  { border-color: var(--wolf); background: rgba(224,92,92,0.08); transform: scale(0.98); }
  .btn-night-target.seer-t:active  { border-color: var(--accent2); background: rgba(123,94,167,0.08); transform: scale(0.98); }
  .btn-night-target.guard-t:active { border-color: #4a8a4a; background: rgba(74,138,74,0.08); transform: scale(0.98); }

  /* Math */
  .math-wrap { width: 100%; max-width: 300px; text-align: center; }
  .math-desc { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
  .math-equation {
    font-family: 'Shippori Mincho', serif; font-size: 52px; font-weight: 800;
    color: var(--moon); margin-bottom: 28px; letter-spacing: 0.1em;
  }
  .math-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn-math {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px 0; font-family: 'Shippori Mincho', serif; font-size: 28px;
    font-weight: 700; color: var(--text); cursor: pointer; transition: all 0.15s;
  }
  .btn-math:active { transform: scale(0.94); }
  .btn-math.correct { border-color: #4a8a4a; background: rgba(74,138,74,0.12); color: #7ac07a; }
  .btn-math.wrong { animation: shake 0.35s ease; border-color: var(--wolf); color: #e08080; }

  @keyframes shake {
    0%,100%{ transform: translateX(0); }
    20%{ transform: translateX(-6px); }
    60%{ transform: translateX(6px); }
  }

  /* Seer / Medium result */
  .seer-result-box {
    width: 100%; max-width: 300px; border-radius: 12px; padding: 24px;
    text-align: center; margin-bottom: 16px; border: 1.5px solid;
    animation: revealPop 0.3s ease;
  }
  .seer-result-box.wolf    { background: rgba(224,92,92,0.08);  border-color: rgba(224,92,92,0.4); }
  .seer-result-box.citizen { background: rgba(74,138,74,0.08);  border-color: rgba(74,138,74,0.4); }
  .seer-result-box.solo    { background: rgba(56,180,220,0.08);  border-color: rgba(56,180,220,0.4); }
  .seer-result-name { font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 700; color: var(--moon); margin-bottom: 8px; }
  .seer-result-role { font-size: 16px; font-weight: 600; }
  .seer-result-box.wolf    .seer-result-role { color: #e08080; }
  .seer-result-box.citizen .seer-result-role { color: #7ac07a; }
  .seer-result-box.solo    .seer-result-role { color: #56c8e0; }

  /* Morning */
  .morning-icon { font-size: 56px; margin-bottom: 16px; }
  .morning-label { font-size: 11px; letter-spacing: 0.4em; color: var(--muted); margin-bottom: 8px; }
  .morning-title {
    font-family: 'Shippori Mincho', serif; font-size: 28px; font-weight: 700;
    color: var(--moon); margin-bottom: 24px;
  }
  .morning-victim-card {
    width: 100%; max-width: 300px;
    background: linear-gradient(145deg, #2a1010, #1a0808);
    border: 1.5px solid rgba(224,92,92,0.4); border-radius: 12px;
    padding: 18px; margin-bottom: 12px;
  }
  .morning-victim-name { font-family: 'Shippori Mincho', serif; font-size: 28px; font-weight: 700; color: #ffd0d0; margin-bottom: 8px; }
  .morning-victim-role { font-size: 14px; color: rgba(224,92,92,0.8); }
  .morning-safe-card {
    width: 100%; max-width: 300px;
    background: rgba(74,138,74,0.08); border: 1.5px solid rgba(74,138,74,0.3);
    border-radius: 12px; padding: 20px; margin-bottom: 24px;
    font-size: 14px; color: #7ac07a; line-height: 1.6;
  }
  .morning-divider { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 0 auto 24px; }

  /* ========= LANG TOGGLE ========= */
  .lang-toggle {
    position: absolute; top: 14px; right: 14px; z-index: 300;
    display: flex; gap: 6px;
  }
  .lang-btn {
    background: transparent; border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px; font-size: 11px;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.05em;
  }
  .lang-btn.active { border-color: var(--accent); color: var(--accent); }


  /* ========= ROLE GUIDE ========= */
  #screen-guide {
    position: fixed;
    inset: 0;
    z-index: 500;
    background: #000;
    display: none;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    padding: 0;
    min-height: 100dvh;
    animation: none;
  }
  #screen-guide.active { display: flex; }

  .guide-subtitle {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 700;
    color: #c8c840;
    letter-spacing: 0.05em;
    line-height: 1.3;
    margin-bottom: 16px;
  }
  .guide-header {
    text-align: center;
    padding: 12px 60px 6px;
    flex-shrink: 0;
  }
  .guide-role-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 38px;
    font-weight: 800;
    letter-spacing: 0.15em;
  }
  .guide-role-name.wolf-name    { color: #e05050; }
  .guide-role-name.citizen-name { color: #7ac07a; }
  .guide-role-name.solo-name    { color: #56c8e0; }

  .guide-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  .guide-illust {
    flex: 0 0 42%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #000;
    position: relative;
  }
  .guide-illust img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center bottom;
  }
  .guide-illust-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    font-size: 80px;
    opacity: 0.3;
  }

  .guide-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 16px 20px 16px 8px;
    overflow-y: auto;
  }
  .guide-tag {
    font-size: 11px;
    letter-spacing: 0.3em;
    margin-bottom: 14px;
    padding: 3px 10px;
    border-radius: 20px;
    display: inline-block;
    align-self: flex-start;
  }
  .guide-tag.wolf-tag    { background: rgba(224,80,80,0.15); color: #e08080; border: 1px solid rgba(224,80,80,0.4); }
  .guide-tag.citizen-tag { background: rgba(74,138,74,0.15); color: #7ac07a; border: 1px solid rgba(74,138,74,0.4); }
  .guide-tag.solo-tag    { background: rgba(56,200,224,0.15); color: #56c8e0; border: 1px solid rgba(56,200,224,0.4); }

  .guide-desc {
    font-size: clamp(12px, 3vw, 15px);
    line-height: 1.9;
    color: #b8c870;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .guide-nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 20px 10px;
    z-index: 10;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .guide-nav-btn:active { opacity: 1; }
  .guide-nav-left  { left: 0; }
  .guide-nav-right { right: 0; }
  .guide-nav-arrow {
    width: 0; height: 0;
    display: block;
  }
  .guide-nav-left  .guide-nav-arrow { border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-right: 28px solid #c8a940; }
  .guide-nav-right .guide-nav-arrow { border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-left:  28px solid #c8a940; }

  .guide-footer {
    text-align: center;
    padding: 12px 0 20px;
    flex-shrink: 0;
  }
  .guide-back-btn {
    background: transparent;
    border: none;
    color: #c8a940;
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    letter-spacing: 0.2em;
    cursor: pointer;
    padding: 8px 20px;
  }
  .guide-back-btn:active { opacity: 0.7; }

  .guide-counter {
    font-size: 11px;
    color: #555;
    letter-spacing: 0.2em;
    margin-top: 4px;
  }

  /* Role button on title */
  .btn-role-guide {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 300;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .btn-role-guide:active { border-color: var(--accent); color: var(--accent); }
  /* Decorative corner */
  .corner-deco {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--accent2) 70%, transparent 100%);
    opacity: 0.4;
    z-index: 100;
  }
</style>
</head>
<body>

<div class="corner-deco"></div>

<!-- ====== TITLE SCREEN ====== -->
<div id="screen-title" class="screen active">
  <div class="title-bg"></div>
  <button class="btn-role-guide" id="btn-role-guide" onclick="openGuide()">📖 役職</button>
  <div class="lang-toggle"><button class="lang-btn active" id="btn-ja" onclick="setLang('ja')">日本語</button><button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button></div>

  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:1vh;width:100%;position:relative;z-index:1;">
    <div class="moon"></div>
    <div class="wolf-icon">🐺</div>
    <h1 class="title-main">人狼</h1>
    <p class="title-sub">JINRO — 夜の村</p>
    <div class="title-divider"></div>
    <button class="btn-play" onclick="unlockAudio(); showScreen('count')" data-i18n="play">プ　レ　イ</button>
  </div>

  <div class="forest-silhouette">
    <svg viewBox="0 0 400 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,160 L0,100 L15,85 L25,95 L35,65 L45,80 L55,50 L65,70 L75,40 L85,60 L95,30 L105,55 L115,20 L125,50 L135,35 L145,65 L155,25 L165,55 L175,38 L185,68 L195,15 L205,45 L215,28 L225,58 L235,18 L245,48 L255,32 L265,62 L275,42 L285,72 L295,30 L305,60 L315,45 L325,75 L335,55 L345,85 L355,65 L365,90 L375,70 L385,95 L400,80 L400,160 Z" fill="#0a0a0f"/>
      <path d="M0,160 L0,120 L20,105 L40,115 L60,90 L80,100 L100,80 L120,95 L140,75 L160,90 L180,70 L200,85 L220,68 L240,82 L260,72 L280,88 L300,76 L320,92 L340,80 L360,95 L380,85 L400,100 L400,160 Z" fill="#0d0d14" opacity="0.9"/>
    </svg>
  </div>
</div>

<!-- ====== COUNT SCREEN ====== -->
<div id="screen-count" class="screen">
  <div class="progress-dots">
    <div class="dot done"></div>
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="screen-header">
    <p class="screen-label" data-i18n="step1_label">Step 1</p>
    <h2 class="screen-title" data-i18n="step1_title">人数を選ぶ</h2>
  </div>

  <div class="count-grid">
    <button class="btn-count" onclick="selectCount(4)"><span class="count-num">4</span><span class="count-label" data-i18n="count_play">人でプレイ</span></button>
    <button class="btn-count" onclick="selectCount(5)"><span class="count-num">5</span><span class="count-label" data-i18n="count_play">人でプレイ</span></button>
    <button class="btn-count" onclick="selectCount(6)"><span class="count-num">6</span><span class="count-label" data-i18n="count_play">人でプレイ</span></button>
    <button class="btn-count" onclick="selectCount(7)"><span class="count-num">7</span><span class="count-label" data-i18n="count_play">人でプレイ</span></button>
    <button class="btn-count" onclick="selectCount(8)"><span class="count-num">8</span><span class="count-label" data-i18n="count_play">人でプレイ</span></button>
    <button class="btn-count" onclick="selectCount(9)"><span class="count-num">9</span><span class="count-label" data-i18n="count_play">人でプレイ</span></button>
    <button class="btn-count" onclick="selectCount(10)" style="grid-column: span 2;"><span class="count-num">10</span><span class="count-label" data-i18n="count_play">人でプレイ</span></button>
  </div>

  <button class="btn-back" onclick="showScreen('title')" data-i18n="back">← 戻る</button>
</div>

<!-- ====== NAMES SCREEN ====== -->
<div id="screen-names" class="screen">
  <div class="progress-dots">
    <div class="dot done"></div>
    <div class="dot done"></div>
    <div class="dot active"></div>
    <div class="dot"></div>
  </div>

  <div class="screen-header">
    <p class="screen-label" data-i18n="step2_label">Step 2</p>
    <h2 class="screen-title" data-i18n="step2_title">名前を入力</h2>
  </div>

  <div class="scroll-area">
    <div class="names-list" id="names-list"></div>
  </div>

  <button class="btn-primary" onclick="goToMode()" data-i18n="next">次へ →</button>
  <button class="btn-back" onclick="unlockAudio(); showScreen('count')" data-i18n="back">← 戻る</button>
</div>

<!-- ====== MODE SCREEN ====== -->
<div id="screen-mode" class="screen">
  <div class="progress-dots">
    <div class="dot done"></div>
    <div class="dot done"></div>
    <div class="dot done"></div>
    <div class="dot active"></div>
  </div>

  <div class="screen-header">
    <p class="screen-label" data-i18n="step3_label">Step 3</p>
    <h2 class="screen-title" data-i18n="step3_title">モードを選ぶ</h2>
  </div>

  <div class="mode-cards">
    <button class="mode-card normal-card" onclick="startGame('normal')">
      <span class="mode-badge badge-standard">STANDARD</span>
      <span class="mode-icon">🌕</span>
      <div class="mode-name">ノーマルモード</div>
      <div class="mode-desc">普通の人狼。村人・人狼・占い師・霊媒師・ボディーガード・裏切り者が出てくる。</div>
    </button>

    <button class="mode-card job-card" onclick="startGame('job')">
      <span class="mode-badge badge-coming">JOB MODE</span>
      <span class="mode-icon">🔮</span>
      <div class="mode-name">ジョブモード</div>
      <div class="mode-desc">村人陣営の役職がさらに増え、自己中心の個人陣営も出てくる。</div>
    </button>
  </div>

  <button class="mode-card" style="border-color:#e0a020;text-align:left;padding:24px 20px;width:100%;max-width:360px;cursor:pointer;background:var(--surface);border-radius:12px;border-width:1.5px;position:relative;overflow:hidden;" onclick="startGame('ffa')">
      <span class="mode-badge" style="background:rgba(224,160,32,0.15);color:#e0c060;border:1px solid rgba(224,160,32,0.3);font-size:9px;letter-spacing:.3em;padding:3px 8px;border-radius:20px;">FREE FOR ALL</span>
      <span class="mode-icon">🎭</span>
      <div class="mode-name">フリー・フォー・オール</div>
      <div class="mode-desc">自分の役職を自分で選べる。どんな村になるかはプレイヤー次第。</div>
    </button>
  <button class="btn-back" onclick="showScreen('names')" style="margin-top:20px;" data-i18n="back">← 戻る</button>
</div>

<!-- ====== DEAL PHASE ====== -->
<div id="screen-deal" class="screen">
  <div class="deal-progress" id="deal-progress"></div>

  <!-- PASS STATE: ask player to take phone -->
  <div class="pass-state" id="deal-pass">
    <div class="pass-icon">📱</div>
    <p class="pass-instruction" data-i18n="deal_pass_inst">スマホを渡してください</p>

function t(key, vars={}) {
  let str = (TRANSLATIONS[currentLang] || TRANSLATIONS.ja)[key] || key;
  Object.entries(vars).forEach(([k,v]) => { str = str.replace('{'+k+'}', v); });
  return str;
}

    // Update all data-i18n elements

    document.querySelectorAll('.count-label').forEach(el => {

};

const JOB_WOLF_POOL    = ['wolf','traitor','mafia','pharmacist','detective'];

function generateJobRoles(n) {
  const {v,w,s} = JOB_COUNTS[n];

  // Pick from pool, allow repeating 'wolf' if count > pool size
  function pick(pool, count) {
    const shuffled = [...pool].sort(()=>Math.random()-0.5);
    const result = [];
    for (let i = 0; i < count; i++) {
      result.push(i < shuffled.length ? shuffled[i] : 'wolf');
    }
    return result;
  }

  // Wolf roles: always at least one real 'wolf'
  let wolfRoles = pick(JOB_WOLF_POOL, w);
  if (!wolfRoles.includes('wolf')) wolfRoles[0] = 'wolf';

  const villageRoles = pick(JOB_VILLAGE_POOL, v);
  const soloRoles    = pick(JOB_SOLO_POOL, s);

  const all = [...wolfRoles, ...villageRoles, ...soloRoles];
  for (let i=all.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1)); [all[i],all[j]]=[all[j],all[i]];
  }
  return all;
}

  if (id === 'title') { stopWin(); playBgm('title'); }

function aliveWolves()    { return alivePlayers.filter(i => ROLES[playerRoles[i]].type === 'wolf'); }
function aliveCitizens()  { return alivePlayers.filter(i => ROLES[playerRoles[i]].type === 'village'); }
function aliveNonWolves() { return alivePlayers.filter(i => ROLES[playerRoles[i]].type !== 'wolf'); }

function getRealFaction(idx) {
  // For seer/dentist: cursed shows as wolf, traitor shows as village
  const r = playerRoles[idx];
  if (r === 'cursed') return 'wolf';
  if (r === 'traitor') return 'village';
  if (r === 'detective') return 'village';
  return ROLES[r].type;
}

function generateMath() {
  const a = Math.floor(Math.random()*9)+1, b = Math.floor(Math.random()*9)+1;
  const ans = a + b;
  const wrongs = new Set();
  while (wrongs.size < 3) {
    const w = ans + (Math.floor(Math.random()*5) - 2);
    if (w !== ans && w > 0) wrongs.add(w);
  }
  return { eq:`${a} + ${b}`, ans, choices:[...wrongs, ans].sort(()=>Math.random()-0.5) };
}

function markDeath(idx) {
  // When a player dies, check gambler bets
  gamblerBets && Object.entries(gamblerBets).forEach(([gIdx, tIdx]) => {
    if (+tIdx === idx) gamblerLost.add(+gIdx);
  });
}

  return Array.from({length:playerCount},(_,i)=>{
    const v = document.getElementById(`name-${i+1}`)?.value.trim();
    return v || `プレイヤー${i+1}`;
  });
}

function goToMode() { showScreen('mode'); }

function startGame(mode) {
  // job mode is available
  currentGameMode = mode;
  playerNames = getNames();
  playerRoles = assignRoles(playerCount, mode);
  alivePlayers = playerNames.map((_,i)=>i);
  deadPlayers = []; mediumInvestigated = new Set();
  gamblerBets = {}; gamblerLost = new Set();
  teruExited = new Set(); copyDone = new Set();
  pharmacistPoisons = {}; nightDetectiveActions = [];
  // Init tank shields after roles are set
  tankShielded = {};
  playerRoles.forEach((r,i) => { if (r === 'tank') tankShielded[i] = true; });
  dayCount = 0; dealIndex = 0;
  showDealPass(); showScreen('deal');
}

function assignRoles(n, mode) {
  if (mode === 'job') return generateJobRoles(n);
  if (mode === 'ffa') return Array(n).fill('citizen'); // placeholders, player picks later
  let roles = [...ROLE_TABLE_NORMAL[n]];
  for (let i=roles.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [roles[i],roles[j]] = [roles[j],roles[i]];
  }
  return roles;
}

function ffaPickRole(key) {
  playerRoles[dealIndex] = key;
  // Initialize tank shield if player picks tank
  if (key === 'tank') tankShielded[dealIndex] = true;
  const r = ROLES[key];
  const cardClass = r.type === 'wolf' ? 'wolf' : (r.type === 'solo' || r.type === 'none') ? 'solo' : 'citizen';
  const reveal = document.getElementById('deal-reveal');
  reveal.innerHTML = '';
  reveal.style.display = 'flex';

  const card = document.createElement('div');
  card.className = 'role-card ' + cardClass;
  card.innerHTML = `<span class="role-tag">${r.tag}</span>
    <span class="role-emoji">${r.emoji}</span>
    <span class="role-name">${r.name}</span>
    <p class="role-desc-text">${r.desc}</p>`;
  reveal.appendChild(card);

  const warn = document.createElement('p');
  warn.className = 'role-warning';
  warn.textContent = '⚠️ 他の人には見せないでください';
  reveal.appendChild(warn);

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'btn-confirm';
  confirmBtn.textContent = '確認しました　→';
  confirmBtn.addEventListener('click', confirmRole);
  reveal.appendChild(confirmBtn);
}

function confirmRole() {
  dealIndex++;
  // Restore deal-reveal inner structure for next player (FFA may have mutated it)
  const reveal = document.getElementById('deal-reveal');
  if (currentGameMode === 'ffa') {
    reveal.innerHTML = `
      <div class="role-card citizen" id="deal-role-card">
        <span class="role-tag" id="deal-role-tag"></span>
        <span class="role-emoji" id="deal-role-emoji"></span>
        <span class="role-name" id="deal-role-name"></span>
        <p class="role-desc-text" id="deal-role-desc"></p>
      </div>
      <p class="role-warning" id="deal-role-warning">⚠️ 他の人には見せないでください</p>
      <button class="btn-confirm" onclick="confirmRole()" data-i18n="deal_confirmed">確認しました　→</button>`;
  }
  reveal.style.display = 'none';
  if (dealIndex >= playerCount) {
    // FFA: check faction composition
    if (currentGameMode === 'ffa') {
      const wolves = playerRoles.filter(r => ROLES[r].type === 'wolf').length;
      const village = playerRoles.filter(r => ROLES[r].type === 'village').length;
      if (wolves === 0 && village > 0) {
        document.getElementById('deal-alldone').innerHTML = `
          <div class="alldone-icon">🕊️</div>
          <p class="alldone-title">${t('peace')}</p>
          <p class="alldone-sub">${t('peace_sub')}</p>
          <button class="btn-primary" onclick="location.reload()">${t('try_again')}</button>`;
        document.getElementById('deal-alldone').style.display = 'flex';
        document.getElementById('deal-progress').textContent = t('deal_done');
        return;
      }
      if (wolves > 0 && village === 0) {
        document.getElementById('deal-alldone').innerHTML = `
          <div class="alldone-icon">🐺</div>
          <p class="alldone-title">${t('same_clan_wolf')}</p>

      }

// ─── Day Phase ──────────────────────────────────────
function startDayPhase() { dayCount = 1; showDayScreen(); showScreen('day'); }

function showDayScreen() {
  playBgm('day');

  document.getElementById('day-badge-text').textContent = t('day_badge', {n: dayCount});
  document.getElementById('day-title').textContent = t('day_title');

  chips.innerHTML = '';
  alivePlayers.forEach(i => {
    const c = document.createElement('div'); c.className = 'alive-chip';

  });

  // Tanaka announcement
  const tanakasAlive = alivePlayers.filter(i => playerRoles[i] === 'tanaka');
  let noteText = first
    ? t('day_note_first') : t('day_note');
  if (tanakasAlive.length > 0) {

  }
  document.getElementById('day-note').textContent = noteText;
  document.getElementById('day-note').style.whiteSpace = 'pre-line';

  // FireBoy check (day 2+)
  if (!first && currentGameMode === 'job') {
    const fireboys = alivePlayers.filter(i => playerRoles[i] === 'fireBoy');
    const winners = fireboys.filter(() => Math.floor(Math.random()*10) === 0);
    if (winners.length > 0) {
      setTimeout(() => {
        const names = winners.map(i=>playerNames[i]).join('、');
        document.getElementById('day-note').textContent =
          t('day_fireBoy_win', {names});
        document.getElementById('day-next-btn').textContent = t('day_result');
        document.getElementById('day-next-btn').onclick = () => showVictory('solo', winners);
      }, 300);
      return;
    }
  }

  const btn = document.getElementById('day-next-btn');
  btn.textContent = first ? t('day_to_night') : t('day_to_vote');
  btn.onclick = dayNextPhase;
}

function dayNextPhase() { dayCount === 1 ? startNightPhase() : startVotePhase(); }

// ─── Vote Phase ─────────────────────────────────────
function startVotePhase() {
  playBgm('vote');
  voteOrder = [...alivePlayers]; voteIndex = 0;
  voteTally = {abstain:0};
  alivePlayers.forEach(i => { voteTally[i] = 0; });
  showVoteTurn(); showScreen('vote');
}

function showVoteTurn() {
  const voterIdx = voteOrder[voteIndex];
  document.getElementById('vote-voter-name').textContent = playerNames[voterIdx];
  document.getElementById('vote-progress-fill').style.width = (voteIndex/voteOrder.length*100)+'%';
  const targets = document.getElementById('vote-targets');
  targets.innerHTML = '';
  alivePlayers.forEach(i => {
    if (i === voterIdx) return;
    const btn = document.createElement('button');
    btn.className = 'btn-vote-target';
    btn.innerHTML = `<span class="vote-target-icon">👤</span>${playerNames[i]}`;
    btn.onclick = () => castVote(i);
    targets.appendChild(btn);
  });
}

function castVote(targetIdx) {
  if (targetIdx !== null) voteTally[targetIdx] = (voteTally[targetIdx]||0)+1;
  else voteTally['abstain'] = (voteTally['abstain']||0)+1;
  voteIndex++;
  if (voteIndex >= voteOrder.length) showExecuteResult();
  else { showVoteTurn(); window.scrollTo(0,0); }
}

// ─── Execute Result ──────────────────────────────────
function showExecuteResult() {
  const abstainCount = voteTally['abstain'] || 0;

  // No post-processing needed: politician weight is applied at castVote time
  const adjustedTally = {...voteTally};

  let maxPlayerVotes = 0;
  alivePlayers.forEach(i => { if ((adjustedTally[i]||0) > maxPlayerVotes) maxPlayerVotes = adjustedTally[i]||0; });
  const topCandidates = alivePlayers.filter(i => (adjustedTally[i]||0) === maxPlayerVotes);
  const noExecution = abstainCount > maxPlayerVotes || topCandidates.length > 1 || maxPlayerVotes === 0;

  const content = document.getElementById('execute-content');
  const nextBtn = document.getElementById('execute-next-btn');

  if (noExecution) {
    const reason = abstainCount > maxPlayerVotes
      ? `棄権が最多（${abstainCount}票）でした。`
      : maxPlayerVotes === 0 ? '全員が棄権しました。'
      : topCandidates.map(i=>playerNames[i]).join('、') + ' が同票でした。';
    content.innerHTML = `
      <div class="execute-icon">⚖️</div>
      <p class="execute-label">処刑結果</p>
      <div class="no-execute-box">${reason}<br><br>今日は誰も処刑されませんでした。</div>
      <div class="execute-divider"></div>`;
    nextBtn.textContent = t('exec_to_night');
    nextBtn.onclick = () => startNightPhase();
    showScreen('execute'); return;
  }

  const executedIdx = topCandidates[0];
  const voteSummary = Object.entries(adjustedTally)
    .filter(([k,v])=> v>0 && k!=='abstain').map(([i,v])=>`${playerNames[i]}：${v}票`).join('　')
    + (abstainCount > 0 ? `　棄権：${abstainCount}票` : '');

  // ── てるてる坊主: instant solo win ──
  if (playerRoles[executedIdx] === 'teru') {
    deadPlayers.push({idx:executedIdx, role:playerRoles[executedIdx]});
    alivePlayers = alivePlayers.filter(i => i !== executedIdx);
    markDeath(executedIdx);
    showVictory('solo', [executedIdx]);
    return;
  }

  // Normal execution
  content.innerHTML = `
    <div class="execute-icon">🪦</div>
    <p class="execute-label">処刑</p>
    <p class="execute-name">${playerNames[executedIdx]}</p>
    <p class="execute-votes-summary">${voteSummary}</p>
    <div class="execute-divider"></div>`;

  deadPlayers.push({idx:executedIdx, role:playerRoles[executedIdx]});
  alivePlayers = alivePlayers.filter(i => i !== executedIdx);
  markDeath(executedIdx);

  // ── 爆弾魔: chain kill ──
  let bomberVictimIdx = null;
  if (playerRoles[executedIdx] === 'bomber' && alivePlayers.length > 0) {
    bomberVictimIdx = alivePlayers[Math.floor(Math.random()*alivePlayers.length)];
    deadPlayers.push({idx:bomberVictimIdx, role:playerRoles[bomberVictimIdx]});
    alivePlayers = alivePlayers.filter(i => i !== bomberVictimIdx);
    markDeath(bomberVictimIdx);
    content.innerHTML += `<div class="no-execute-box" style="border-color:#e05c5c;color:#e08080;">
      💣 爆弾魔の道連れ！<br>${playerNames[bomberVictimIdx]} も巻き込まれた…
    </div><div class="execute-divider"></div>`;
  }

  const winResult = checkWinCondition();
  if (winResult) {
    nextBtn.textContent = '結果を見る';
    nextBtn.onclick = () => showVictory(winResult.winner, winResult.soloWinners);
  } else {
    nextBtn.textContent = '夜フェーズへ →';
    nextBtn.onclick = () => startNightPhase();
  }
  showScreen('execute');
}

function showNightAction() {

// Math (citizen / fallback)
function buildMathAction(content) {
  document.getElementById('night-action-title').textContent = t('night_math_title');
  const {eq, ans, choices} = generateMath();
  const wrap = document.createElement('div'); wrap.className = 'math-wrap';
  wrap.innerHTML = `
    <p class="math-desc">${t('night_math_desc').replace('\\n','<br>')}</p>
    <p class="math-equation">${eq} = ?</p>
    <div class="math-choices" id="math-grid"></div>`;
  content.appendChild(wrap);
  const grid = wrap.querySelector('#math-grid');
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'btn-math'; btn.textContent = c;
    btn.onclick = () => {
      if (btn.disabled) return;
      if (c === ans) {
        grid.querySelectorAll('.btn-math').forEach(b => {
          b.disabled = true;
          if (+b.textContent === ans) b.classList.add('correct');
          else b.style.opacity = '0.3';
        });
        setTimeout(() => nightActionDone(), 700);
      } else {
        grid.querySelectorAll('.btn-math').forEach(b => b.disabled = true);
        btn.classList.add('wrong');
        setTimeout(() => {
          btn.classList.remove('wrong');
          grid.querySelectorAll('.btn-math').forEach(b => b.disabled = false);
        }, 400);
      }
    };
    grid.appendChild(btn);
  });
}

// ─── Night Results ───────────────────────────────────
function processNightResults() {
  const newDeaths = new Set();
  let wasProtected = false;

  // 各人狼が独立して1人を選ぶ → 全て殺す（ボディーガードが守った人だけ除外）
  Object.keys(nightWolfVotes).forEach(idxStr => {
    const target = +idxStr;
    if (target === nightProtectedIdx) {
      wasProtected = true; // 少なくとも1人がガードされた
    } else {
      newDeaths.add(target);
    }
  });

  // 警察
  if (nightPoliceTarget !== null) {
    const {police: policeIdx, target: tgt} = nightPoliceTarget;
    const tgtRole = playerRoles[tgt];
    const isValidTarget = (ROLES[tgtRole].type === 'wolf' || tgtRole === 'cursed');
    if (isValidTarget) {
      newDeaths.add(tgt);
    } else {
      newDeaths.add(policeIdx);
    }
  }

  const poisonedDeaths = new Set();
  // 薬剤師の時間差キル（前の夜に毒を盛った対象）
  Object.entries(pharmacistPoisons).forEach(([pIdx, poison]) => {
    if (poison && poison.daySet === dayCount - 1) {
      // This night is the death night (daySet+1 = current dayCount)
      const tgt = poison.targetIdx;
      if (alivePlayers.includes(tgt)) { newDeaths.add(tgt); poisonedDeaths.add(tgt); }
      pharmacistPoisons[+pIdx] = null; // consumed
    }
  });

  // 探偵のアクション処理（タンクのシールド無効）
  nightDetectiveActions.forEach(({detective, target, guess}) => {
    if (!alivePlayers.includes(detective)) return;
    const correct = playerRoles[target] === guess;
    if (correct) {
      // Bypass tank shield
      if (alivePlayers.includes(target)) {
        tankShielded[target] = false; // if tank, destroy shield but still kill
        newDeaths.add(target);
      }
    } else {
      if (alivePlayers.includes(detective)) newDeaths.add(detective);
    }
  });

  // タンクのシールド判定（夜の攻撃のみ・探偵は別処理）
  const shieldBlocked = new Set();
  [...newDeaths].forEach(idx => {
    if (tankShielded[idx] && playerRoles[idx] === 'tank') {
      tankShielded[idx] = false; // shield used up
      newDeaths.delete(idx);
      shieldBlocked.add(idx);
    }
  });

  // 死亡適用
  const diedIdxs = [...newDeaths].filter(idx => alivePlayers.includes(idx));
  diedIdxs.forEach(idx => {
    deadPlayers.push({idx, role: playerRoles[idx]});
    alivePlayers = alivePlayers.filter(i => i !== idx);
    markDeath(idx);
  });

  showMorning(diedIdxs, wasProtected, poisonedDeaths);
}

// ─── Morning ────────────────────────────────────────
function showMorning(diedIdxs, wasProtected, poisonedDeaths=new Set()) {
  const content = document.getElementById('morning-content');
  const nextBtn = document.getElementById('morning-next-btn');

  let html = `<div class="morning-icon">🌅</div>
    <p class="morning-label">${t('morning_night', {n: dayCount})}</p>
    <p class="morning-title">${t('morning_title')}</p>`;

  if (diedIdxs.length > 0) {
    diedIdxs.forEach(idx => {
      const isPoisoned = poisonedDeaths.has(idx);
      html += `<div class="morning-victim-card">
        <p style="font-size:12px;color:rgba(224,92,92,0.7);margin-bottom:8px;letter-spacing:0.2em;">${isPoisoned ? '💊 毒殺' : t('morning_victim')}</p>
        <p class="morning-victim-name">${playerNames[idx]}</p>
      </div>`;
    });
  } else if (wasProtected) {
    html += `<div class="morning-safe-card">🛡️ ボディーガードが守ったおかげで、今夜は誰も犠牲になりませんでした。</div>`;
  } else {
    html += `<div class="morning-safe-card">☀️ 今夜は誰も犠牲になりませんでした。</div>`;
  }
  html += `<div class="morning-divider"></div>`;
  content.innerHTML = html;

  const winResult = checkWinCondition();
  if (winResult) {
    nextBtn.textContent = '結果を見る';
    nextBtn.onclick = () => showVictory(winResult.winner, winResult.soloWinners);
  } else {
    dayCount++;
    nextBtn.textContent = t('morning_next', {n: dayCount});
    nextBtn.onclick = () => { showDayScreen(); showScreen('day'); };
  }
  showScreen('morning');
}

// ─── Win Condition ───────────────────────────────────
function checkWinCondition() {
  const wolves    = aliveWolves();
  const villagers = aliveCitizens();

  // ゲーム終了条件: 人狼が全滅 or 村人陣営が全滅
  const wolfWiped    = wolves.length === 0;
  const villageWiped = villagers.length === 0;
  if (!wolfWiped && !villageWiped) return null;

  const winSide = wolfWiped ? 'village' : 'wolf';

  // ── 個人陣営を全員収集して一緒に勝利 ──
  const soloWinners = new Set();

  // 神（全員）
  alivePlayers.filter(i => playerRoles[i] === 'god').forEach(i => soloWinners.add(i));

  // ギャンブラー（指名した陣営が勝った場合）
  Object.entries(gamblerBets).forEach(([gIdx, tIdx]) => {
    if (gamblerLost.has(+gIdx)) return;
    const betType = ROLES[playerRoles[+tIdx]].type;
    // wolf/traitor → wolf陣営、それ以外（village/solo/none）→ village陣営として扱う
    const betSide = betType === 'wolf' ? 'wolf' : 'village';
    if (winSide === betSide) {
      soloWinners.add(+gIdx);
    }
  });

  // その他の生存中の個人陣営・無陣営
  alivePlayers.forEach(i => {
    const role = playerRoles[i];
    if (role === 'copy') return;     // 未コピーのコピーは勝利しない
    if (role === 'teru') return;     // てるてる坊主は処刑のみ勝利
    if (gamblerLost.has(i)) return;  // 賭けに負けたギャンブラーは勝利しない
    if (gamblerBets[i] !== undefined && !soloWinners.has(i)) return; // ギャンブラーはギャンブラーブロックで処理済み
    const type = ROLES[role].type;
    if (type === 'solo' || type === 'none') soloWinners.add(i);
  });

  if (soloWinners.size > 0) return {winner:'solo', soloWinners: [...soloWinners]};

  return {winner: winSide, soloWinners: []};
}

// ─── BGM ────────────────────────────────────────────
let BGM = null;
let WIN_SFX = null;
let currentBgm = null;
let bgmUnlocked = false;

function initBgm() {
  try {
    BGM = {
      title: new Audio('title.mp3'),
      guide: new Audio('guide.mp3'),
      day:   new Audio('day.mp3'),
      vote:  new Audio('vote.mp3'),
      night: new Audio('night.mp3'),
    };
    WIN_SFX = new Audio('win.mp3');
    Object.values(BGM).forEach(a => { a.loop = true; a.volume = 0.5; });
    WIN_SFX.volume = 1.0;
  } catch(e) {}
}

let pendingPhase = 'title'; // desired BGM before unlock

function unlockAudio() {
  if (bgmUnlocked) return;
  bgmUnlocked = true;
  document.removeEventListener('touchstart', unlockAudio);
  document.removeEventListener('click', unlockAudio);
  if (!BGM) return;
  // Play pendingPhase directly in gesture handler (iOS requires synchronous play)
  Object.values(BGM).forEach(a => { a.pause(); a.currentTime = 0; });
  currentBgm = BGM[pendingPhase] || BGM.title;
  currentBgm.play().catch(() => {});
}

function playBgm(phase) {
  if (!BGM) return;
  pendingPhase = phase;
  Object.values(BGM).forEach(a => { a.pause(); a.currentTime = 0; });
  currentBgm = BGM[phase];
  if (!bgmUnlocked) return; // will play on next tap via pendingPhase
  currentBgm.play().catch(() => {});
}

function stopBgm() {
  if (currentBgm) { currentBgm.pause(); currentBgm.currentTime = 0; currentBgm = null; }
}

function playWin() {
  stopBgm();
  if (!WIN_SFX) return;
  WIN_SFX.currentTime = 0;
  WIN_SFX.play().catch(() => {});
}

function stopWin() {
  if (!WIN_SFX) return;
  WIN_SFX.pause();
  WIN_SFX.currentTime = 0;
}

window.addEventListener('load', initBgm);

let guideIdx = 0;

function openGuide() {
  guideIdx = 0;
  document.getElementById('screen-guide').classList.add('active');
  renderGuide();
  if (!bgmUnlocked) {
    // First interaction — unlock audio and play guide BGM
    bgmUnlocked = true;
    document.removeEventListener('touchstart', unlockAudio);
    document.removeEventListener('click', unlockAudio);
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const buf = ctx.createBuffer(1, 1, 22050);
      const src = ctx.createBufferSource();
      src.buffer = buf; src.connect(ctx.destination); src.start(0);
      ctx.resume();
    } catch(e) {}
  }
  playBgm('guide');
}

function closeGuide() {
  document.getElementById('screen-guide').classList.remove('active');
  playBgm('title');
}

function guideNav(dir) {
  guideIdx = (guideIdx + dir + GUIDE_ROLE_ORDER.length) % GUIDE_ROLE_ORDER.length;
  renderGuide();
}

function renderGuide() {
  const key = GUIDE_ROLE_ORDER[guideIdx];
  const role = ROLES[key];
  const typeClass = role.type === 'wolf' ? 'wolf' : role.type === 'solo' || role.type === 'none' ? 'solo' : 'citizen';

  // Name
  const nameEl = document.getElementById('guide-role-name');
  nameEl.textContent = role.name;
  nameEl.className = 'guide-role-name ' + typeClass + '-name';

  // Tag
  const tagEl = document.getElementById('guide-tag');
  tagEl.textContent = role.tag;
  tagEl.className = 'guide-tag ' + typeClass + '-tag';

  // Subtitle
  const subtitleEl = document.getElementById('guide-subtitle');
  if (subtitleEl) subtitleEl.textContent = GUIDE_SUBTITLES[key] || '';

  // Description
  const descs = currentLang === 'en' ? GUIDE_DESCRIPTIONS_EN : GUIDE_DESCRIPTIONS;
  const rawDesc = descs[key] || role.desc;
  document.getElementById('guide-desc').innerHTML = rawDesc.replace(/\\n/g, '<br>');

  // Illustration
  const illustEl = document.getElementById('guide-illust');
  const imgPath = 'img/' + key + '.png';
  illustEl.innerHTML = '';
  const img = document.createElement('img');
  img.src = imgPath;
  img.alt = role.name;
  img.onerror = function() {
    illustEl.innerHTML = '<div class="guide-illust-placeholder">' + role.emoji + '</div>';
  };
  illustEl.appendChild(img);

  // Counter
  document.getElementById('guide-counter').textContent = (guideIdx + 1) + ' / ' + GUIDE_ROLE_ORDER.length;

  // Update back button text
  document.querySelector('.guide-back-btn').textContent = currentLang === 'en' ? '← Back' : '← 戻る';
}

</script>

<div id="screen-guide">
  <div class="guide-header">
    <div class="guide-role-name" id="guide-role-name"></div>
  </div>

  <div style="position:relative;flex:1;display:flex;min-height:0;">
    <button class="guide-nav-btn guide-nav-left" onclick="guideNav(-1)">
      <span class="guide-nav-arrow"></span>
    </button>

    <div class="guide-body">
      <div class="guide-illust" id="guide-illust"></div>
      <div class="guide-info">
        <div class="guide-subtitle" id="guide-subtitle"></div>
        <span class="guide-tag" id="guide-tag"></span>
        <p class="guide-desc" id="guide-desc"></p>
      </div>
    </div>

    <button class="guide-nav-btn guide-nav-right" onclick="guideNav(1)">
      <span class="guide-nav-arrow"></span>
    </button>
  </div>

  <div class="guide-footer">
    <div class="guide-counter" id="guide-counter"></div>
    <button class="guide-back-btn" onclick="closeGuide()">← 戻る</button>
  </div>
</div>
